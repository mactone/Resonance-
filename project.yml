name: Resonance
options:
  bundleIdPrefix: com.resonance
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: "YES"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Resonance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Resonance
        excludes:
          - Resources/Info.plist
    info:
      path: Sources/Resonance/Resources/Info.plist
      properties:
        CFBundleName: Resonance
        CFBundleDisplayName: Resonance
        CFBundleIdentifier: com.resonance.app
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Resonance 需要麥克風權限來錄製你的語音閃念。"
        NSSpeechRecognitionUsageDescription: "Resonance 需要語音辨識權限來將你的錄音轉換成文字。"
        BGTaskSchedulerPermittedIdentifiers:
          - com.resonance.article-generation
        UIBackgroundModes:
          - processing
          - audio
    entitlements:
      path: Resonance.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.resonance.app
        INFOPLIST_FILE: Sources/Resonance/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resonance.entitlements
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
      - sdk: BackgroundTasks.framework
      - sdk: UserNotifications.framework
      - sdk: MessageUI.framework
      - sdk: SwiftData.framework
        embed: false
    preBuildScripts:
      - name: SwiftLint (optional)
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false

schemes:
  Resonance:
    build:
      targets:
        Resonance: all
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug": "1"
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
